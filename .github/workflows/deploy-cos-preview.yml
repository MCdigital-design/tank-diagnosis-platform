name: Deploy COS Preview

on:
  workflow_dispatch:
    inputs:
      label:
        description: '发布说明（如 v1.2.0 内部演示）'
        required: false
        default: 'preview'

jobs:
  build-deploy-cos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE_PATH: /
          VITE_PREVIEW_AUTH: 'true'
          VITE_PREVIEW_USER: ${{ secrets.PREVIEW_USER }}
          VITE_PREVIEW_PASS: ${{ secrets.PREVIEW_PASS }}
      - name: Upload dist to Tencent COS
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          if [ -z "$COS_SECRET_ID" ] || [ -z "$COS_SECRET_KEY" ] || [ -z "$COS_BUCKET" ] || [ -z "$COS_REGION" ]; then
            echo "::error::Add COS_SECRET_ID, COS_SECRET_KEY, COS_BUCKET, COS_REGION in GitHub repo Secrets."
            exit 1
          fi
          npm install -g cos-nodejs-sdk-v5
          node <<'NODE'
          const COS = require('cos-nodejs-sdk-v5');
          const fs = require('fs');
          const path = require('path');

          const cos = new COS({
            SecretId: process.env.COS_SECRET_ID,
            SecretKey: process.env.COS_SECRET_KEY,
          });

          const bucket = process.env.COS_BUCKET;
          const region = process.env.COS_REGION;
          const distDir = path.join(process.cwd(), 'dist');

          function walk(dir) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            const files = [];
            for (const ent of entries) {
              const full = path.join(dir, ent.name);
              if (ent.isDirectory()) files.push(...walk(full));
              else files.push(full);
            }
            return files;
          }

          async function uploadAll() {
            const files = walk(distDir);
            for (const file of files) {
              const key = path.relative(distDir, file).replace(/\\/g, '/');
              await new Promise((resolve, reject) => {
                cos.putObject(
                  {
                    Bucket: bucket,
                    Region: region,
                    Key: key,
                    Body: fs.createReadStream(file),
                  },
                  (err) => (err ? reject(err) : resolve()),
                );
              });
              console.log('uploaded:', key);
            }
          }

          uploadAll().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          NODE
