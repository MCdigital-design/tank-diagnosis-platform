# Tencent Lighthouse / Nginx — preview static site + basic auth
# Copy dist/ to /var/www/tank-preview/dist
# Generate htpasswd on server: htpasswd -cb /etc/nginx/tank-preview.htpasswd Z-Float '<password>'
# Include from nginx.conf: include /path/to/preview.conf;

server {
    listen 80;
    server_name _;

    root /var/www/tank-preview/dist;
    index index.html;

    auth_basic "Tank Preview";
    auth_basic_user_file /etc/nginx/tank-preview.htpasswd;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
